[Setup]
;本机（前端机）实际地址、Modem板实际地址
ServerIp_Orig=192.168.0.89
ModemIp_Orig=192.168.0.70

ServerPort=1234
ModemPort=1104
PauseDisplay=0
IpSelect=0
ServerIp=127.0.0.1
ModemIp=127.0.0.1


;CCL与充电电压波形的量程设置
;AutoRange，量程类型：=1为自动量程，=0为人为设置的固定量程
;RangeL，量程下限
;RangeH，量程上限
;ChargeVolt_Show4Second，充电电压显示几个4s
[Wave]
CCL_AutoRange=0
CCL_RangeL=0
CCL_RangeH=5000
ChargeVolt_AutoRange=0
ChargeVolt_RangeL=0
ChargeVolt_RangeH=5000
ChargeVolt_Show4Second=2


[CmdIndex]
1=Modem


[Cmd_Modem]
1=开始充电,[{4600 0000 0000 0400 F020 5000 6000}]  [{4600 0000 0000 3A00 0000 0300}  {0F00 0000 0600 4600 3400}  {0D00 0000 0600 8700 2A00 2800 0601 0700 0000}  {0D00 0000 0600 8001  6e00 0100}  8f00]
2=关闭充电,[{4600 0000 0000 0400 F020 5000 6000}]  [{4600 0000 0000 3A00 0000 0300}  {0F00 0000 0600 4600 3400}  {0D00 0000 0600 8700 2A00 2800 0601 0700 0000}  {0D00 0000 0600 8001  6e00 0000}  8e00]
3=开始测井,[{4600 0000 0000 0400 F020 5000 6000}]  [{4600 0000 0000 3A00 0000 0300}  {0F00 0000 0600 4600 3400}  {0D00 0000 0600 8700 2A00 2800 0601 0700 0000}  {0D00 0000 0600 8001  1100 0000}  3100]
4=停止上传,[{4600 0000 0000 0400 1020 0000 3000}]


[Power]
OverVolt=400
OverCurrent=2000
OutputVolt=45
MaxOutputVolt=500

[Cable]
Core=7
Channel=1
WorkMode=1
FireType=1
